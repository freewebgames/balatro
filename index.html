<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Balatro Local Chunk Loader</title>

<style>
html, body {
  width: 100vw;
  height: 100vh;
  margin: 0;
  overflow: hidden;
  background: #000;
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100vw;
  height: 100vh;
  display: block;
}
</style>

<script>
/* =========================================================
   BLOCK POPUPS / DIALOGS
========================================================= */
(() => {
  window.alert = () => {};
  window.prompt = () => null;
  window.confirm = () => false;
  window.open = () => null;

  if (window.HTMLDialogElement) {
    const noop = () => {};
    HTMLDialogElement.prototype.show = noop;
    HTMLDialogElement.prototype.showModal = noop;
    HTMLDialogElement.prototype.close = noop;
  }
})();
</script>

<script>
/* =========================================================
   BLOCK FULLSCREEN REQUESTS
========================================================= */
(() => {
  const noOp = () => Promise.reject("Fullscreen blocked");

  document.exitFullscreen = noOp;
  document.webkitExitFullscreen = noOp;
  document.mozCancelFullScreen = noOp;
  document.msExitFullscreen = noOp;

  const elemProto = HTMLElement.prototype;
  elemProto.requestFullscreen = noOp;
  elemProto.webkitRequestFullscreen = noOp;
  elemProto.mozRequestFullScreen = noOp;
  elemProto.msRequestFullscreen = noOp;
})();
</script>

<script>
/* =========================================================
   DISABLE INDEXEDDB COMPLETELY (NO SAVING LAYER)
========================================================= */
(() => {
  if (!window.indexedDB) return;

  // Hard-disable persistence surface used by many web games
  try {
    const noopOpen = () => {
      console.warn("IndexedDB blocked");
      return null;
    };

    indexedDB.open = noopOpen;
    indexedDB.deleteDatabase = () => {
      console.warn("IndexedDB delete blocked");
      return null;
    };
  } catch (e) {
    console.warn("Failed to disable IndexedDB:", e);
  }
})();
</script>

<script>
/* =========================================================
   LOCAL FILE CONFIG
========================================================= */
const BASE = "./";

const MODULE_PARTS = [
  "modulejs_part_aa",
  "modulejs_part_ab",
  "modulejs_part_ac",
  "modulejs_part_ad",
  "modulejs_part_ae",
  "modulejs_part_af"
];

/* =========================================================
   SAFE BINARY MERGER
========================================================= */
async function loadModuleFromChunks() {
  const buffers = await Promise.all(
    MODULE_PARTS.map(f =>
      fetch(BASE + f).then(async r => {
        if (!r.ok) throw new Error("Failed loading chunk: " + f);
        return r.arrayBuffer();
      })
    )
  );

  const blob = new Blob(buffers, { type: "application/javascript" });
  const url = URL.createObjectURL(blob);

  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.onload = () => {
      URL.revokeObjectURL(url);
      resolve();
    };
    s.onerror = reject;
    document.body.appendChild(s);
  });
}

/* =========================================================
   SCRIPT LOADER
========================================================= */
function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.onload = resolve;
    s.onerror = reject;
    document.body.appendChild(s);
  });
}
</script>

</head>

<body>
<canvas id="canvas"></canvas>

<script>
/* =========================================================
   BOOT SEQUENCE
========================================================= */
(async () => {
  try {
    const canvasEl = document.getElementById("canvas");

    /* ========================= ENGINE ========================= */
    await loadScript(BASE + "love.min.js");

    if (typeof Love !== "function") {
      throw new Error("love.min.js failed (Love missing)");
    }

    /* ========================= MODULE ========================= */
    await loadModuleFromChunks();

    if (typeof getSource !== "function") {
      throw new Error("module failed (getSource missing)");
    }

    /* ========================= GAME DATA ========================= */
    const d = await getSource();

    window.Module = {
      INITIAL_MEMORY: 2 ** 28,
      canvas: canvasEl,
      printErr: console.error,
      arguments: ["game.love"]
    };

    Module.preRun = [function () {
      Module.addRunDependency("fp game.love");

      const ptr = Module.getMemory(d.length);
      Module["HEAPU8"].set(d, ptr);
      Module.FS_createDataFile("/", "game.love", d, true, true, true);

      Module.removeRunDependency("fp game.love");
    }];

    Love(Module);

  } catch (err) {
    console.error(err);
    document.body.innerHTML =
      "<pre style='color:white;white-space:pre-wrap;padding:16px;margin:0'>" +
      (err?.stack || err) +
      "</pre>";
  }
})();
</script>

</body>
</html>
