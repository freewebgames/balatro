<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Balatro Local Chunk Loader</title>

<style>
html, body {
    width: 100vw;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    background: #000;
}

#canvas {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
}
</style>

<script>
/* =========================================================
   BLOCK POPUPS / DIALOGS
   ========================================================= */
(() => {
    window.alert = () => {};
    window.prompt = () => null;
    window.confirm = () => false;
    window.open = () => null;

    if (window.HTMLDialogElement) {
        const noop = () => {};
        HTMLDialogElement.prototype.show = noop;
        HTMLDialogElement.prototype.showModal = noop;
        HTMLDialogElement.prototype.close = noop;
    }
})();
</script>

<script>
/* =========================================================
   FULLSCREEN BLOCK
   ========================================================= */
(() => {
    const noOp = () => Promise.reject("Fullscreen blocked");

    document.exitFullscreen = noOp;
    document.webkitExitFullscreen = noOp;
    document.mozCancelFullScreen = noOp;
    document.msExitFullscreen = noOp;

    const p = HTMLElement.prototype;
    p.requestFullscreen = noOp;
    p.webkitRequestFullscreen = noOp;
    p.mozRequestFullScreen = noOp;
    p.msRequestFullscreen = noOp;
})();
</script>

<script>
/* =========================================================
   INDEXEDDB PREFIX PATCH
   ========================================================= */
(() => {
    if (!window.indexedDB) return;

    const PREFIX = "Balatro_vanilla_";

    const open = indexedDB.open.bind(indexedDB);
    const del = indexedDB.deleteDatabase.bind(indexedDB);

    indexedDB.open = (name, version) =>
        version !== undefined ? open(PREFIX + name, version) : open(PREFIX + name);

    indexedDB.deleteDatabase = (name) => del(PREFIX + name);
})();
</script>

<script>
/* =========================================================
   CONFIG
   ========================================================= */
const BASE = "./";

const MODULE_PARTS = [
    "modulejs_part_aa",
    "modulejs_part_ab",
    "modulejs_part_ac",
    "modulejs_part_ad",
    "modulejs_part_ae",
    "modulejs_part_af"
];

/* =========================================================
   iOS-SAFE CHUNK LOADER (XHR)
   ========================================================= */
function loadChunk(name) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", BASE + name, true);
        xhr.responseType = "arraybuffer";

        xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) {
                resolve(xhr.response);
            } else {
                reject(new Error("HTTP " + xhr.status + " for " + name));
            }
        };

        xhr.onerror = () => reject(new Error("Network error: " + name));
        xhr.send();
    });
}

/* retry wrapper */
async function loadChunkSafe(name, retries = 3) {
    for (let i = 0; i < retries; i++) {
        try {
            return await loadChunk(name);
        } catch (e) {
            if (i === retries - 1) throw e;
        }
    }
}

/* =========================================================
   MODULE LOADER (NO BLOBS, IOS SAFE)
   ========================================================= */
async function loadModuleFromChunks() {

    const buffers = await Promise.all(
        MODULE_PARTS.map(f => loadChunkSafe(f))
    );

    /* Merge binary chunks */
    const mergedLength = buffers.reduce((a, b) => a + b.byteLength, 0);
    const merged = new Uint8Array(mergedLength);

    let offset = 0;
    for (const b of buffers) {
        merged.set(new Uint8Array(b), offset);
        offset += b.byteLength;
    }

    /* Decode JS safely */
    const code = new TextDecoder("utf-8").decode(merged);

    /* Execute safely across all platforms */
    const script = document.createElement("script");
    script.text = code;
    document.body.appendChild(script);
}

/* =========================================================
   SCRIPT LOADER
   ========================================================= */
function loadScript(url) {
    return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = url;
        s.onload = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
    });
}
</script>

</head>

<body>

<canvas id="canvas"></canvas>

<script>
/* =========================================================
   BOOT SEQUENCE
   ========================================================= */
(async () => {

    try {

        const canvasEl = document.getElementById("canvas");

        /* ENGINE */
        await loadScript(BASE + "love.min.js");

        if (typeof Love !== "function") {
            throw new Error("love.min.js failed");
        }

        /* MODULE */
        await loadModuleFromChunks();

        if (typeof getSource !== "function") {
            throw new Error("module failed (getSource missing)");
        }

        /* GAME DATA */
        const d = await getSource();

        window.Module = {
            INITIAL_MEMORY: 2 ** 28,
            canvas: canvasEl,
            printErr: console.error,
            arguments: ["game.love"]
        };

        Module.preRun = [function () {

            Module.addRunDependency("fp game.love");

            const ptr = Module.getMemory(d.length);

            Module["HEAPU8"].set(d, ptr);

            Module.FS_createDataFile(
                "/",
                "game.love",
                d,
                true,
                true,
                true
            );

            Module.removeRunDependency("fp game.love");
        }];

        Love(Module);

    } catch (err) {

        console.error(err);

        document.body.innerHTML =
            "<pre style='color:white;white-space:pre-wrap;padding:16px;margin:0'>" +
            (err?.stack || err) +
            "</pre>";
    }

})();
</script>

</body>
</html>
