<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Balatro CDN Chunk Loader</title>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    background: #000;

    display: flex;
    align-items: center;
    justify-content: center;
}

/* =========================================
   FIXED WINDOWED CANVAS
========================================= */
#canvas {
    width: 1280px;
    height: 720px;

    max-width: 100vw;
    max-height: 100vh;

    display: block;
    background: #000;
}

/* stop browser fullscreen styling */
canvas:fullscreen,
canvas:-webkit-full-screen,
canvas:-moz-full-screen,
canvas:-ms-fullscreen {
    width: 1280px !important;
    height: 720px !important;
}
</style>

<script>
/* =========================================================
   BLOCK POPUPS / DIALOGS / FULLSCREEN
   ========================================================= */
(() => {

    window.alert = () => {};
    window.prompt = () => null;
    window.confirm = () => false;

    window.open = () => null;

    if (window.HTMLDialogElement) {
        const noop = () => {};
        HTMLDialogElement.prototype.show = noop;
        HTMLDialogElement.prototype.showModal = noop;
        HTMLDialogElement.prototype.close = noop;
    }

    /* =========================================
       BLOCK FULLSCREEN REQUESTS
    ========================================= */

    const deny = () => Promise.reject?.("Fullscreen blocked");

    const protoTargets = [
        Element.prototype,
        HTMLCanvasElement.prototype
    ];

    for (const proto of protoTargets) {

        proto.requestFullscreen = deny;
        proto.webkitRequestFullscreen = deny;
        proto.webkitRequestFullScreen = deny;
        proto.mozRequestFullScreen = deny;
        proto.msRequestFullscreen = deny;
    }

    document.exitFullscreen = () => {};
    document.webkitExitFullscreen = () => {};
    document.mozCancelFullScreen = () => {};
    document.msExitFullscreen = () => {};

})();
</script>

<script>
/* =========================================================
   INDEXEDDB PREFIX PATCH
   ========================================================= */
(() => {

    if (!window.indexedDB) return;

    const PREFIX = "Balatro_vanilla_";

    const open = indexedDB.open.bind(indexedDB);
    const del = indexedDB.deleteDatabase.bind(indexedDB);

    indexedDB.open = (name, version) =>
        version !== undefined
            ? open(PREFIX + name, version)
            : open(PREFIX + name);

    indexedDB.deleteDatabase = (name) => del(PREFIX + name);

})();
</script>

<script>
/* =========================================================
   CDN CONFIG
   ========================================================= */

const CDN = "https://cdn.jsdelivr.net/gh/freewebgames/balatro/";

const MODULE_PARTS = [
    "modulejs_part_aa",
    "modulejs_part_ab",
    "modulejs_part_ac",
    "modulejs_part_ad",
    "modulejs_part_ae",
    "modulejs_part_af"
];

/* =========================================================
   SAFE BINARY MERGER (NO STRING CORRUPTION)
   ========================================================= */
async function loadModuleFromChunks() {

    const buffers = await Promise.all(
        MODULE_PARTS.map(f =>
            fetch(CDN + f).then(r => r.arrayBuffer())
        )
    );

    const blob = new Blob(buffers, {
        type: "application/javascript"
    });

    const url = URL.createObjectURL(blob);

    return new Promise((resolve, reject) => {

        const s = document.createElement("script");

        s.src = url;
        s.onload = resolve;
        s.onerror = reject;

        document.body.appendChild(s);
    });
}

/* =========================================================
   ENGINE LOADER
   ========================================================= */
function loadScript(url) {

    return new Promise((resolve, reject) => {

        const s = document.createElement("script");

        s.src = url;
        s.onload = resolve;
        s.onerror = reject;

        document.body.appendChild(s);
    });
}
</script>

</head>

<body>

<canvas id="canvas" width="1280" height="720"></canvas>

<script>
/* =========================================================
   BOOT SEQUENCE
   ========================================================= */
(async () => {

    try {

        const canvasEl = document.getElementById("canvas");

        /* =========================================
           FORCE WINDOWED MODE
        ========================================= */

        Object.defineProperty(canvasEl, "style", {
            value: canvasEl.style,
            writable: false
        });

        const originalSetAttribute =
            canvasEl.setAttribute.bind(canvasEl);

        canvasEl.setAttribute = function(name, value) {

            if (
                name === "style" ||
                name === "width" ||
                name === "height"
            ) {
                return;
            }

            return originalSetAttribute(name, value);
        };

        /* =========================
           STAGE 1: ENGINE
        ========================= */

        await loadScript(CDN + "love.min.js");

        if (typeof Love !== "function") {
            throw new Error("love.min.js failed (Love missing)");
        }

        /* =========================
           STAGE 2: MODULE
        ========================= */

        await loadModuleFromChunks();

        if (typeof getSource !== "function") {
            throw new Error("module failed (getSource missing)");
        }

        /* =========================
           STAGE 3: GAME DATA
        ========================= */

        const d = await getSource();

        window.Module = {
            INITIAL_MEMORY: 2 ** 28,
            canvas: canvasEl,
            printErr: console.error,
            arguments: ["game.love"]
        };

        Module.preRun = [function () {

            Module.addRunDependency("fp game.love");

            const ptr = Module.getMemory(d.length);

            Module["HEAPU8"].set(d, ptr);

            Module.FS_createDataFile(
                "/",
                "game.love",
                d,
                true,
                true,
                true
            );

            Module.removeRunDependency("fp game.love");
        }];

        Love(Module);

        /* =========================================
           KEEP GAME FROM RESIZING CANVAS
        ========================================= */

        const forceCanvasSize = () => {

            canvasEl.width = 1280;
            canvasEl.height = 720;

            canvasEl.style.width = "1280px";
            canvasEl.style.height = "720px";
        };

        forceCanvasSize();

        setInterval(forceCanvasSize, 500);

    } catch (err) {

        console.error(err);

        document.body.innerHTML =
            "<pre style='color:white;white-space:pre-wrap;padding:16px;margin:0'>" +
            (err?.stack || err) +
            "</pre>";
    }

})();
</script>

</body>
</html>
